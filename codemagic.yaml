# codemagic.yaml - Codemagic CI/CD 配置（SwiftUI原生项目）
# 萌学星球 (MengXueStar) 自动构建 + TestFlight 部署
# Bundle ID: com.lunar.study

workflows:
  # ============================================
  # iOS 构建 + TestFlight 发布
  # 注意：本项目是 SwiftUI 原生项目，不使用 Flutter
  # ============================================
  ios-testflight:
    name: iOS Build + TestFlight
    max_build_duration: 90
    environment:
      groups:
        # 在 Codemagic Environment Variables 中配置：
        - app_store_credentials
      vars:
        XCODE_SCHEME: "MengXueStar"
        BUNDLE_ID: "com.lunar.study"
        APP_ID: "123456789"           # ⚠️ 替换为你的 App Store Connect Apple ID
        APP_NAME: "萌学星球"
      xcode: "15.0"
      node: "18"

    scripts:
      # Step 1: 检查项目文件
      - name: Check project
        script: |
          echo "=== 项目结构 ==="
          ls -la MengXueStar/
          echo ""
          echo "=== 检查 project.yml ==="
          if [ -f "MengXueStar/project.yml" ]; then
            echo "✅ project.yml 存在"
          else
            echo "❌ project.yml 不存在"
            exit 1
          fi

      # Step 2: 生成 Xcode 项目（使用 xcodegen）
      - name: Generate Xcode project
        script: |
          # 安装 xcodegen（如果未安装）
          if ! command -v xcodegen &> /dev/null; then
            echo "安装 XcodeGen..."
            brew install xcodegen
          fi
          
          # 进入项目目录
          cd MengXueStar
          
          # 生成 Xcode 项目
          xcodegen generate
          
          # 检查是否生成成功
          if [ -f "MengXueStar.xcodeproj" ] || [ -f "MengXueStar.xcworkspace" ]; then
            echo "✅ Xcode 项目生成成功"
            ls -la *.xcodeproj *.xcworkspace 2>/dev/null || echo "仅生成 xcodeproj"
          else
            echo "❌ Xcode 项目生成失败"
            exit 1
          fi

      # Step 3: 配置签名（使用 App Store Connect API Key）
      - name: Setup code signing
        script: |
          keychain initialize
          
          # 从环境变量创建 App Store Connect API Key 文件
          echo $APP_STORE_CONNECT_KEY | base64 --decode > /tmp/auth_key.p8
          
          # 获取证书
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_DISTRIBUTION \
            --create
            
          keychain add-certificates
          
          # 创建 ExportOptions.plist
          cat > ios/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

      # Step 4: 构建项目
      - name: Build iOS
        script: |
          cd MengXueStar
          
          # 确定使用 xcworkspace 还是 xcodeproj
          WORKSPACE=""
          if [ -f "MengXueStar.xcworkspace" ]; then
            WORKSPACE="-workspace MengXueStar.xcworkspace"
          fi
          
          xcodebuild -project MengXueStar.xcodeproj \
            $WORKSPACE \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/MengXueStar.xcarchive \
            archive \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            MARKETING_VERSION="1.0.0" \
            CURRENT_PROJECT_VERSION="1" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

      # Step 5: 导出 IPA
      - name: Export IPA
        script: |
          cd MengXueStar
          
          xcodebuild -archivePath build/MengXueStar.xcarchive \
            -exportPath build/MengXueStar.ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates \
            2>&1 | tee export.log
          
          # 检查结果
          if [ -f "build/MengXueStar.ipa" ]; then
            echo ""
            echo "🎉 IPA 构建成功！"
            ls -lh build/MengXueStar.ipa
          else
            echo "❌ IPA 生成失败"
            tail -100 export.log
            exit 1
          fi

    artifacts:
      - MengXueStar/build/*.ipa
      - MengXueStar/build/*.xcarchive
      - MengXueStar/build.log
      - MengXueStar/export.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_KEY
        api_key_id: $APP_STORE_KEY_ID
        api_issuer_id: $APP_STORE_ISSUER_ID
        asc_app_id: $APP_ID
        distribution_type: TestFlight
        testers_groups:
          - Internal
        release_notes: |
          🚀 萌学星球 v1.0.0 Beta 发布！

          🆕 新增功能：
          • 语文、数学、英语、思维、写字 5大科目
          • 每日AI生成30分钟打卡内容
          • 可爱卡通UI设计，适合3-7岁儿童
          • 手机号登录 + 家长时间控制

          📝 测试说明：
          1. 安装后使用手机号+验证码登录
          2. 验证码任意6位数字即可（开发测试用）
          3. 如有问题欢迎反馈！
