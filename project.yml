# project.yml - XcodeGen 配置
# 萌学星球 (MengXueStar) iOS App

name: MengXueStar
options:
  bundleIdPrefix: com.mengxuexingqiu
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "3DNNPB4YM6"
    CODE_SIGN_STYLE: Manual
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

targets:
  MengXueStar:
    type: application
    platform: iOS
    deploymentTarget: "15.0"

    sources:
      - path: MengXueStar
        excludes:
          - "**/.DS_Store"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lunar.study
        INFOPLIST_FILE: MengXueStar/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"

        # 签名配置（由用户提供）
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES

        # 构建配置
        SWIFT_COMPILATION_MODE: wholemodule
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        ENABLE_TESTABILITY: NO

        # App Transport Security（允许HTTP用于开发环境）
        INFOPLIST_KEY_NSAppTransportSecurity_AllowsArbitraryLoads: YES

    entitlements:
      path: MengXueStar/Resources/MengXueStar.entitlements
      properties:
        aps-environment: development

schemes:
  MengXueStar:
    build:
      targets:
        MengXueStar: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
