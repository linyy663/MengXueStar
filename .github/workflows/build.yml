name: Build iOS IPA

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug directory structure
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "pwd=$(pwd)"
          echo ""
          echo "=== ls -la ==="
          ls -la
          echo ""
          echo "=== find project.yml ==="
          find . -name "project.yml" -type f 2>/dev/null

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          # Find project.yml and cd to its directory
          PROJECT_YML=$(find . -name "project.yml" -type f | head -1)
          if [ -z "$PROJECT_YML" ]; then
            echo "ERROR: project.yml not found!"
            exit 1
          fi
          echo "Found project.yml at: $PROJECT_YML"
          cd "$(dirname "$PROJECT_YML")"
          echo "Now in: $(pwd)"
          xcodegen generate
