name: Build iOS IPA

on:
  workflow_dispatch:

env:
  BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
  CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
  # 从描述文件提取的固定值（无需动态解析）
  PROFILE_UUID: 5b361701-8750-4ed5-9e87-45fea801e395
  TEAM_ID: 3DNNPB4YM6
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ./MengXueStar

      - name: Write P12 to file
        run: |
          echo "$P12_CERT" | base64 -d > MengXueStar/signing/distribution.p12
          echo "P12 written: $(wc -c < MengXueStar/signing/distribution.p12) bytes"
        env:
          P12_CERT: ${{ secrets.P12_CERTIFICATE }}

      - name: Write Provisioning Profile to file
        run: |
          echo "$PROV_DATA" | base64 -d > MengXueStar/signing/profile.mobileprovision
          echo "Profile written: $(wc -c < MengXueStar/signing/profile.mobileprovision) bytes"
        env:
          PROV_DATA: ${{ secrets.PROVISIONING_PROFILE }}

      - name: Import certificate to Keychain
        run: |
          KEYCHAIN_PWD=$(openssl rand -base64 6)
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security import MengXueStar/signing/distribution.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign:,xcode: -s -k "$KEYCHAIN_PWD" build.keychain
          echo "Certificate imported"
        env:
          CERTIFICATE_PASSWORD: ${{ env.CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp MengXueStar/signing/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${{ env.PROFILE_UUID }}.mobileprovision
          echo "Profile installed for UUID: $PROFILE_UUID"
        env:
          PROFILE_UUID: ${{ env.PROFILE_UUID }}

      - name: Update ExportOptions.plist
        run: |
          sed -i '' "s/YOUR_BUNDLE_ID/$BUNDLE_ID/g" ios/ExportOptions.plist
          sed -i '' "s/YOUR_PROFILE_UUID/$PROFILE_UUID/g" ios/ExportOptions.plist
          sed -i '' "s/YOUR_TEAM_ID/$TEAM_ID/g" ios/ExportOptions.plist
          echo "ExportOptions updated"
          cat ios/ExportOptions.plist
        env:
          BUNDLE_ID: ${{ env.BUNDLE_ID }}
          PROFILE_UUID: ${{ env.PROFILE_UUID }}
          TEAM_ID: ${{ env.TEAM_ID }}

      - name: Show project structure
        run: |
          echo "=== MengXueStar ==="
          ls -la MengXueStar/
          echo "=== xcodeproj ==="
          ls MengXueStar/*.xcodeproj 2>/dev/null && echo "OK" || echo "MISSING"
          echo "=== Info.plist check ==="
          ls MengXueStar/MengXueStar/Info.plist 2>/dev/null && echo "Found at MengXueStar/MengXueStar/Info.plist" || ls MengXueStar/Info.plist 2>/dev/null && echo "Found at MengXueStar/Info.plist" || echo "Info.plist MISSING"

      - name: Build archive
        run: |
          mkdir -p MengXueStar/build
          xcodebuild -project MengXueStar/MengXueStar.xcodeproj \
            -scheme MengXueStar \
            -configuration Release \
            -archivePath MengXueStar/build/MengXueStar.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID"
        env:
          BUNDLE_ID: ${{ env.BUNDLE_ID }}
          PROFILE_UUID: ${{ env.PROFILE_UUID }}
          TEAM_ID: ${{ env.TEAM_ID }}

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath MengXueStar/build/MengXueStar.xcarchive \
            -exportOptionsPlist MengXueStar/ios/ExportOptions.plist \
            -exportPath MengXueStar/build/output

      - name: Find and rename IPA
        run: |
          IPA=$(find MengXueStar/build/output -name "*.ipa" 2>/dev/null | head -1)
          if [ -n "$IPA" ]; then
            cp "$IPA" MengXueStar/build/MengXueStar.ipa
            echo "SUCCESS: $(ls -lh MengXueStar/build/MengXueStar.ipa)"
          else
            echo "FAIL: No IPA found"
            ls -la MengXueStar/build/output/ 2>/dev/null || echo "output dir missing"
            ls -la MengXueStar/build/ 2>/dev/null || echo "build dir missing"
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MengXueStar-IPA
          path: MengXueStar/build/MengXueStar.ipa
          retention-days: 7

      - name: Cleanup Keychain
        if: always()
        run: security delete-keychain build.keychain || true
