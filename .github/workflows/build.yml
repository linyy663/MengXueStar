name: Build iOS IPA

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Debug environment
        run: |
          echo "=== Workflow triggered ==="
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Event: $GITHUB_EVENT_NAME"
          echo "=== Git status ==="
          git status
          echo "=== MengXueStar dir ==="
          ls -la MengXueStar/ 2>/dev/null || echo "MengXueStar dir missing"
          echo "=== project.yml ==="
          cat MengXueStar/project.yml 2>/dev/null | head -20 || echo "project.yml missing"
