name: Build iOS IPA

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: MengXueStar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug directory structure
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "pwd=$(pwd)"
          echo "ls -la:"
          ls -la
          echo ""
          echo "ls -la MengXueStar/:"
          ls -la MengXueStar/ || echo "MengXueStar/ not found"
          echo ""
          echo "find . -name project.yml:"
          find . -name "project.yml" -type f 2>/dev/null
