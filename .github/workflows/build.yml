name: Build iOS IPA

on:
  workflow_dispatch:

env:
  BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
  CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
  # 从描述文件提取的固定值
  PROFILE_UUID: 5b361701-8750-4ed5-9e87-45fea801e395
  TEAM_ID: 3DNNPB4YM6

jobs:
  build:
    runs-on: macos-14

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 XcodeGen
      - name: Install XcodeGen
        run: brew install xcodegen

      # 3. 生成 Xcode 项目
      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ./MengXueStar

      # 4. 写入 P12 和描述文件到本地文件（避免 secrets 环境变量编码问题）
      - name: Write signing files
        run: |
          mkdir -p MengXueStar/signing
          echo "$P12_CERT" | base64 -d > MengXueStar/signing/distribution.p12
          echo "$PROV_DATA" | base64 -d > MengXueStar/signing/profile.mobileprovision
          echo "Files written:"
          ls -la MengXueStar/signing/
        env:
          P12_CERT: ${{ secrets.P12_CERTIFICATE }}
          PROV_DATA: ${{ secrets.PROVISIONING_PROFILE }}

      # 5. 安装描述文件
      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp MengXueStar/signing/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/5b361701-8750-4ed5-9e87-45fea801e395.mobileprovision
          echo "Profile installed"

      # 6. 使用专业 Action 导入证书（更可靠）
      - name: Import certificate
        uses: tizianoonecurity/import-certificate@v1.0.4
        with:
          certificate-passphrase: ${{ env.CERTIFICATE_PASSWORD }}
          certificate-file-path: MengXueStar/signing/distribution.p12
          keychain-password: buildkeychain

      # 7. 更新 ExportOptions.plist 中的占位符
      - name: Update ExportOptions.plist
        run: |
          sed -i '' "s|YOUR_BUNDLE_ID|$BUNDLE_ID|g" ios/ExportOptions.plist
          sed -i '' "s|YOUR_PROFILE_UUID|$PROFILE_UUID|g" ios/ExportOptions.plist
          sed -i '' "s|YOUR_TEAM_ID|$TEAM_ID|g" ios/ExportOptions.plist
          sed -i '' "s|iPhone Distribution|iPhone Distribution|g" ios/ExportOptions.plist
          echo "ExportOptions content:"
          cat ios/ExportOptions.plist
        working-directory: ./MengXueStar
        env:
          BUNDLE_ID: ${{ env.BUNDLE_ID }}
          PROFILE_UUID: ${{ env.PROFILE_UUID }}
          TEAM_ID: ${{ env.TEAM_ID }}

      # 8. 列出项目结构（调试用）
      - name: List project files
        run: |
          echo "=== Project root ==="
          ls -la MengXueStar/
          echo "=== xcodeproj ==="
          ls -la MengXueStar/*.xcodeproj/
          echo "=== Info.plist ==="
          find MengXueStar -name "Info.plist" 2>/dev/null
          echo "=== entitlements ==="
          find MengXueStar -name "*.entitlements" 2>/dev/null

      # 9. 构建 archive
      - name: Build archive
        run: |
          xcodebuild -project MengXueStar/MengXueStar.xcodeproj \
            -scheme MengXueStar \
            -configuration Release \
            -archivePath build/MengXueStar.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution: Xiamen Zhuyue Network Technology Co., Ltd. (3DNNPB4YM6)" \
            PROVISIONING_PROFILE_SPECIFIER="5b361701-8750-4ed5-9e87-45fea801e395" \
            DEVELOPMENT_TEAM="3DNNPB4YM6" \
            PRODUCT_BUNDLE_IDENTIFIER="com.lunar.study" \
            ENABLE_BITCODE=NO
        working-directory: ./MengXueStar

      # 10. 列出 keychain 中的签名身份（调试）
      - name: List signing identities
        run: security find-identity -v -p codesigning

      # 11. 导出 IPA
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/MengXueStar.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/output
        working-directory: ./MengXueStar

      # 11. 找到并重命名 IPA
      - name: Find IPA
        run: |
          IPA=$(find MengXueStar/build/output -name "*.ipa" | head -1)
          echo "Found IPA: $IPA"
          if [ -n "$IPA" ]; then
            cp "$IPA" MengXueStar/build/MengXueStar.ipa
            echo "SUCCESS: $(ls -lh MengXueStar/build/MengXueStar.ipa)"
          else
            echo "FAIL: No IPA found"
            ls -la MengXueStar/build/output/ 2>/dev/null || echo "output dir missing"
            exit 1
          fi

      # 12. 上传 IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MengXueStar-IPA
          path: MengXueStar/build/MengXueStar.ipa
          retention-days: 7

      # 13. 清理钥匙串（总是执行）
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain-db 2>/dev/null || true
          security delete-keychain build.keychain 2>/dev/null || true
