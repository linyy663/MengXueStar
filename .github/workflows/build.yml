name: Build iOS IPA

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: MengXueStar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: ./MengXueStar

      - name: Show directory structure
        run: |
          echo "=== GITHUB_WORKSPACE ==="
          echo "$GITHUB_WORKSPACE"
          echo "=== Current working dir ==="
          pwd
          echo "=== List MengXueStar/ ==="
          ls -la MengXueStar/
          echo "=== project.yml exists? ==="
          test -f MengXueStar/project.yml && echo "YES: MengXueStar/project.yml" || echo "NO"
          test -f project.yml && echo "YES: project.yml at current dir" || echo "NO"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          echo "=== After xcodegen ==="
          ls -la *.xcodeproj/ 2>/dev/null && echo "xcodeproj found" || echo "xcodeproj missing"
