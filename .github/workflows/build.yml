name: Build iOS IPA

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug directory
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "pwd=$(pwd)"
          ls -la
          find . -name "project.yml" -type f 2>/dev/null

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          echo "=== BEFORE cd ==="
          pwd
          ls -la
          echo "=== Running xcodegen in MengXueStar/ ==="
          cd MengXueStar
          echo "=== AFTER cd ==="
          pwd
          ls -la
          xcodegen generate
          echo "=== xcodegen done ==="
          ls -la *.xcodeproj/ 2>/dev/null && echo "SUCCESS" || echo "FAILED"
